<!-- ~/Desktop/fastapos-cloud/src/dashboard.html -->
<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastaPos Cloud Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Auth Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 flex-col px-4">
        <div class="w-full max-w-md p-8 rounded-2xl glass">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 mb-2 italic">⚡ FastaPos</h1>
                <p class="text-slate-400">Cloud Owner Dashboard</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Email ya Mgahawa</label>
                    <input type="email" id="email" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500" placeholder="mfano@fastapos.co.tz">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Nenosiri (Password)</label>
                    <input type="password" id="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-all mt-4">
                    Ingia Kwenye Dashboard
                </button>
            </div>
        </div>
        <p class="mt-8 text-slate-500 text-sm">FastaPos v6.0 &copy; 2026</p>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden">
        <nav class="border-b border-white/10 px-6 py-4 flex justify-between items-center glass sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-bold text-blue-500 italic">⚡ FastaPos</span>
                <span id="tenantName" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-sm font-medium border border-blue-500/30">
                    Inapakia...
                </span>
            </div>
            <button onclick="handleLogout()" class="text-slate-400 hover:text-white flex items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> Toka
            </button>
        </nav>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold">Overview ya Leo</h2>
                    <p class="text-slate-400" id="lastSyncTime">Inapakia data...</p>
                </div>
                <button onclick="fetchDashboardData()" class="bg-slate-800 p-2 rounded hover:bg-slate-700">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>

            <!-- Stats Grid -->
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-slate-400 text-sm mb-1">Mapato ya Leo</p>
                    <h3 class="text-3xl font-bold" id="statRevenue">TSh 0</h3>
                </div>
                <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500">
                    <p class="text-slate-400 text-sm mb-1">Orders Zilizoisha</p>
                    <h3 class="text-3xl font-bold" id="statOrders">0</h3>
                </div>
                <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                    <p class="text-slate-400 text-sm mb-1">Vyumba Vyenye Wageni</p>
                    <h3 class="text-3xl font-bold" id="statRooms">0</h3>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-500">
                <i class="fa-solid fa-satellite-dish text-6xl mb-4"></i>
                <h3 class="text-xl">Hakuna data bado</h3>
                <p>Hakikisha Cloud Sync imewashwa kwenye Settings -> Cloud</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = window.location.origin;
        let TOKEN = localStorage.getItem('fastapos_cloud_token');

        // Check login status
        if (TOKEN) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            fetchDashboardData();
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) return alert('Jaza email na password');

            btn.disabled = true;
            btn.innerText = 'Inatafuta...';

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.ok) {
                    localStorage.setItem('fastapos_cloud_token', data.token);
                    localStorage.setItem('fastapos_tenant_info', JSON.stringify(data.tenant));
                    window.location.reload();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Imeshindwa kuunganisha kwenye server');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Ingia Kwenye Dashboard';
            }
        }

        async function fetchDashboardData() {
            const tenantInfo = JSON.parse(localStorage.getItem('fastapos_tenant_info'));
            if (tenantInfo) {
                document.getElementById('tenantName').innerText = tenantInfo.name;
            }

            try {
                const res = await fetch(`${API_URL}/api/dashboard`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const result = await res.json();

                if (result.ok && result.data) {
                    const d = result.data;
                    document.getElementById('statRevenue').innerText = `TSh ${Number(d.revenue || 0).toLocaleString()}`;
                    document.getElementById('statOrders').innerText = d.orderCount || 0;
                    document.getElementById('statRooms').innerText = d.roomCount || 0;
                    document.getElementById('lastSyncTime').innerText = `Sync ya mwisho: ${new Date(result.syncedAt).toLocaleString('sw-TZ')}`;
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('statsGrid').classList.remove('hidden');
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('statsGrid').classList.add('hidden');
                    document.getElementById('lastSyncTime').innerText = 'Inasubiri sync ya kwanza...';
                }
            } catch (err) {
                console.error('Fetch error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('fastapos_cloud_token');
            localStorage.removeItem('fastapos_tenant_info');
            window.location.reload();
        }
    </script>
</body>
</html>
