<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastaPos — Owner Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background: #0f172a; color: #fff; min-height: 100vh; }
    .hidden { display: none !important; }

    /* Login */
    #login-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-box { background:#1e293b; border-radius:20px; padding:40px; width:100%; max-width:400px; border:1px solid #334155; }
    .login-logo { text-align:center; margin-bottom:28px; }
    .login-logo h1 { font-size:28px; font-weight:900; color:#f59e0b; letter-spacing:-0.03em; }
    .login-logo p { color:#94a3b8; font-size:13px; margin-top:4px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
    .field input { width:100%; height:44px; padding:0 14px; background:#0f172a; border:1.5px solid #334155; border-radius:10px; color:#fff; font-size:14px; outline:none; }
    .field input:focus { border-color:#f59e0b; }
    .btn-primary { width:100%; height:46px; background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }
    .error-msg { color:#ef4444; font-size:13px; text-align:center; margin-top:10px; min-height:20px; }

    /* Dashboard */
    #dashboard-page { min-height:100vh; }
    header { background:#1e293b; border-bottom:1px solid #334155; padding:0 24px; height:56px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10; }
    .logo { font-size:18px; font-weight:900; color:#f59e0b; }
    .tenant-name { font-size:13px; color:#94a3b8; }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
    .sync-badge { font-size:11px; padding:3px 10px; border-radius:20px; background:#164e63; color:#67e8f9; font-weight:600; }
    .logout-btn { padding:6px 14px; background:transparent; border:1px solid #334155; border-radius:8px; color:#94a3b8; font-size:12px; cursor:pointer; }

    main { max-width:1100px; margin:0 auto; padding:24px; }
    h2 { font-size:22px; font-weight:800; color:#fff; margin-bottom:4px; }
    .subtitle { font-size:13px; color:#64748b; margin-bottom:24px; }

    /* KPI Grid */
    .kpi-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px; }
    @media(min-width:600px){ .kpi-grid { grid-template-columns:repeat(4,1fr); } }
    .kpi-card { background:#1e293b; border-radius:16px; padding:18px; border:1px solid #334155; }
    .kpi-label { font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
    .kpi-value { font-size:24px; font-weight:900; font-family:monospace; letter-spacing:-.03em; }
    .kpi-sub { font-size:11px; color:#64748b; margin-top:4px; }
    .green { color:#22c55e; } .yellow { color:#f59e0b; } .blue { color:#3b82f6; } .purple { color:#8b5cf6; } .red { color:#ef4444; }

    /* Hotel section */
    .hotel-section { background:#1e293b; border-radius:16px; padding:18px 20px; border:1px solid #334155; margin-bottom:24px; }
    .section-title { font-size:14px; font-weight:800; color:#fff; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .hotel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    @media(min-width:500px){ .hotel-grid { grid-template-columns:repeat(5,1fr); } }
    .hotel-stat { background:#0f172a; border-radius:10px; padding:12px; text-align:center; }
    .hotel-stat-val { font-size:20px; font-weight:900; font-family:monospace; }
    .hotel-stat-label { font-size:10px; color:#64748b; font-weight:700; text-transform:uppercase; margin-top:3px; }

    /* Top items */
    .top-items { background:#1e293b; border-radius:16px; padding:18px 20px; border:1px solid #334155; margin-bottom:24px; }
    .item-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #1e293b55; }
    .item-rank { width:28px; height:28px; border-radius:8px; background:#0f172a; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#f59e0b; flex-shrink:0; }
    .item-name { flex:1; font-size:13px; font-weight:600; color:#e2e8f0; }
    .item-qty { font-size:12px; color:#64748b; }
    .item-rev { font-size:13px; font-weight:700; color:#22c55e; font-family:monospace; }

    /* Payment methods */
    .methods { background:#1e293b; border-radius:16px; padding:18px 20px; border:1px solid #334155; margin-bottom:24px; }
    .method-row { display:flex; align-items:center; gap:12px; padding:8px 0; }
    .method-name { font-size:12px; font-weight:700; color:#94a3b8; text-transform:uppercase; width:80px; flex-shrink:0; }
    .method-bar-wrap { flex:1; height:8px; background:#0f172a; border-radius:4px; overflow:hidden; }
    .method-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,#22c55e,#16a34a); transition:width .6s ease; }
    .method-val { font-size:12px; font-weight:700; color:#fff; font-family:monospace; width:90px; text-align:right; flex-shrink:0; }

    /* History */
    .history { background:#1e293b; border-radius:16px; padding:18px 20px; border:1px solid #334155; }
    .history-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #0f172a; }
    .history-date { font-size:12px; color:#94a3b8; width:90px; flex-shrink:0; }
    .history-revenue { font-size:14px; font-weight:800; color:#22c55e; font-family:monospace; flex:1; }
    .history-orders { font-size:12px; color:#64748b; }

    /* No data */
    .no-data { text-align:center; padding:48px 24px; color:#64748b; }
    .no-data .icon { font-size:48px; margin-bottom:12px; }
    .no-data p { font-size:14px; }

    /* Loading */
    .loading { text-align:center; padding:60px; color:#64748b; font-size:14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:32px; height:32px; border:3px solid #334155; border-top-color:#f59e0b; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1>⚡ FastaPos</h1>
      <p>Owner Dashboard — Ona biashara yako popote</p>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="owner@mgahawa.co.tz"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Ingia →</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboard-page" class="hidden">
  <header>
    <span class="logo">⚡ FastaPos</span>
    <span class="tenant-name" id="tenant-name-header">—</span>
    <div class="header-right">
      <span class="sync-badge" id="sync-badge">🔄 Inapakia...</span>
      <button class="logout-btn" onclick="doLogout()">Toka</button>
    </div>
  </header>

  <main>
    <h2 id="dash-title">Overview ya Leo</h2>
    <div class="subtitle" id="dash-subtitle">Inapakia data...</div>

    <div id="dash-content">
      <div class="loading"><div class="spinner"></div>Inapakia data...</div>
    </div>
  </main>
</div>

<script>
  const API = window.location.origin;
  let token = localStorage.getItem('fp_token');
  let tenantInfo = JSON.parse(localStorage.getItem('fp_tenant') || 'null');
  let refreshInterval = null;

  // ── Auto login ───────────────────────────────────────────────
  if (token) showDashboard();

  // ── Login ────────────────────────────────────────────────────
  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.textContent = '';

    if (!email || !password) { errEl.textContent = 'Jaza email na password'; return; }

    try {
      const res  = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!data.ok) { errEl.textContent = data.message; return; }

      token      = data.token;
      tenantInfo = data.tenant;
      localStorage.setItem('fp_token', token);
      localStorage.setItem('fp_tenant', JSON.stringify(tenantInfo));
      showDashboard();
    } catch {
      errEl.textContent = 'Imeshindwa kuunganika na server';
    }
  }

  function doLogout() {
    localStorage.removeItem('fp_token');
    localStorage.removeItem('fp_tenant');
    if (refreshInterval) clearInterval(refreshInterval);
    document.getElementById('login-page').classList.remove('hidden');
    document.getElementById('dashboard-page').classList.add('hidden');
  }

  function showDashboard() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('dashboard-page').classList.remove('hidden');
    if (tenantInfo) {
      document.getElementById('tenant-name-header').textContent = tenantInfo.name;
    }
    loadData();
    loadHistory();
    // Refresh kila dakika 2
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => { loadData(); loadHistory(); }, 120000);
  }

  // ── Format helpers ───────────────────────────────────────────
  const fmt = (n) => 'TSh ' + (Number(n)||0).toLocaleString('sw-TZ');

  // ── Load dashboard data ──────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(`${API}/api/dashboard`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { doLogout(); return; }
      const json = await res.json();

      if (!json.data) {
        document.getElementById('dash-content').innerHTML = `
          <div class="no-data">
            <div class="icon">📡</div>
            <p>Hakuna data bado</p>
            <p style="margin-top:8px;font-size:12px;">Hakikisha Cloud Sync imewashwa kwenye Settings → Cloud</p>
          </div>`;
        document.getElementById('sync-badge').textContent = '⚫ Haijasync';
        return;
      }

      const d   = json.data;
      const r   = d.restaurant || {};
      const h   = d.hotel || {};
      const syncTime = new Date(json.syncedAt).toLocaleTimeString('sw-TZ', {hour:'2-digit',minute:'2-digit'});
      document.getElementById('sync-badge').textContent = `✅ Sync: ${syncTime}`;
      document.getElementById('dash-subtitle').textContent =
        `Leo ${new Date().toLocaleDateString('sw-TZ',{weekday:'long',day:'numeric',month:'long'})} · Imesasishwa: ${syncTime}`;

      let html = '';

      // KPI cards
      const totalRev = d.totalRevenue || ((r.revenue||0) + (h.revenue||0));
      html += `<div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Mapato Yote Leo</div>
          <div class="kpi-value green">${fmt(totalRev)}</div>
          <div class="kpi-sub">${r.orders||0} order${h.revenue>0?' + vyumba':''}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Order Zinaendelea</div>
          <div class="kpi-value yellow">${r.activeOrders||0}</div>
          <div class="kpi-sub">mgahawa sasa hivi</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Wastani / Order</div>
          <div class="kpi-value blue">${fmt(r.avgOrder||0)}</div>
          <div class="kpi-sub">kwa kila order</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Orders Leo</div>
          <div class="kpi-value purple">${r.orders||0}</div>
          <div class="kpi-sub">zilizolipwa</div>
        </div>
      </div>`;

      // Hotel section
      if (h.total > 0) {
        html += `<div class="hotel-section">
          <div class="section-title">🏨 Vyumba — Sasa Hivi</div>
          <div class="hotel-grid">
            <div class="hotel-stat"><div class="hotel-stat-val blue">${h.total}</div><div class="hotel-stat-label">Vyumba</div></div>
            <div class="hotel-stat"><div class="hotel-stat-val green">${h.available}</div><div class="hotel-stat-label">Inapatikana</div></div>
            <div class="hotel-stat"><div class="hotel-stat-val yellow">${h.occupied}</div><div class="hotel-stat-label">Imechukuliwa</div></div>
            <div class="hotel-stat"><div class="hotel-stat-val purple">${h.cleaning||0}</div><div class="hotel-stat-label">Inasafishwa</div></div>
            <div class="hotel-stat"><div class="hotel-stat-val red">${h.occupancyRate||0}%</div><div class="hotel-stat-label">Occupancy</div></div>
          </div>
          ${h.revenue>0 ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid #334155;display:flex;justify-content:space-between;font-size:13px;"><span style="color:#64748b">Mapato ya Vyumba Leo</span><span style="font-weight:800;color:#22c55e;font-family:monospace">${fmt(h.revenue)}</span></div>` : ''}
        </div>`;
      }

      // Payment methods
      const methods = r.byMethod || {};
      const totalPay = Object.values(methods).reduce((s,v)=>s+(v||0), 0);
      if (Object.keys(methods).length > 0) {
        const methodIcons = { cash:'💵', mpesa:'📱', tigopesa:'📲', airtel:'📡', card:'💳', mobile_money:'📱' };
        html += `<div class="methods">
          <div class="section-title">💳 Malipo kwa Njia</div>
          ${Object.entries(methods).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a).map(([m,v])=>`
            <div class="method-row">
              <div class="method-name">${methodIcons[m]||'💰'} ${m}</div>
              <div class="method-bar-wrap"><div class="method-bar" style="width:${totalPay>0?Math.round((v/totalPay)*100):0}%"></div></div>
              <div class="method-val">${fmt(v)}</div>
            </div>`).join('')}
        </div>`;
      }

      // Top items
      if (d.topItems && d.topItems.length > 0) {
        const medals = ['🥇','🥈','🥉'];
        html += `<div class="top-items">
          <div class="section-title">🏆 Bidhaa Zinazopendelewa Leo</div>
          ${d.topItems.map((item,i)=>`
            <div class="item-row">
              <div class="item-rank">${medals[i]||i+1}</div>
              <div class="item-name">${item.name}</div>
              <div class="item-qty">×${item.qty}</div>
              <div class="item-rev">${fmt(item.revenue)}</div>
            </div>`).join('')}
        </div>`;
      }

      document.getElementById('dash-content').innerHTML = html;
    } catch(err) {
      console.error(err);
      document.getElementById('sync-badge').textContent = '❌ Hitilafu';
    }
  }

  // ── Load history ─────────────────────────────────────────────
  async function loadHistory() {
    try {
      const res  = await fetch(`${API}/api/history?days=7`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const json = await res.json();
      if (!json.data || json.data.length === 0) return;

      const rows = json.data.map(row => {
        const d = row.data || {};
        const r = d.restaurant || {};
        const h = d.hotel || {};
        const total = d.totalRevenue || ((r.revenue||0)+(h.revenue||0));
        return `<div class="history-row">
          <div class="history-date">${new Date(row.date).toLocaleDateString('sw-TZ',{weekday:'short',day:'numeric',month:'short'})}</div>
          <div class="history-revenue">${fmt(total)}</div>
          <div class="history-orders">${r.orders||0} order${h.occupied>0?` · 🏨 ${h.occupied}/${h.total}`:''}</div>
        </div>`;
      }).join('');

      // Append history section if not exists
      const existing = document.getElementById('history-section');
      if (!existing) {
        const section = document.createElement('div');
        section.id = 'history-section';
        section.className = 'history';
        section.innerHTML = `<div class="section-title">📅 Historia — Wiki Hii</div>${rows}`;
        document.getElementById('dash-content').appendChild(section);
      } else {
        existing.innerHTML = `<div class="section-title">📅 Historia — Wiki Hii</div>${rows}`;
      }
    } catch {}
  }
</script>
</body>
</html>
