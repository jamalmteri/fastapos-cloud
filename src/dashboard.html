<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastaPos Cloud Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Login Overlay (Inabaki ile ile) -->
    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 px-4">
        <div class="w-full max-w-md p-8 rounded-2xl glass">
            <h1 class="text-3xl font-bold text-amber-500 mb-6 italic text-center text-orange-500">⚡ FastaPos</h1>
            <input type="email" id="email" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 mb-4" placeholder="Email">
            <input type="password" id="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 mb-6" placeholder="Password">
            <button onclick="handleLogin()" class="w-full bg-orange-600 hover:bg-orange-700 py-3 rounded-lg font-bold">Ingia Dashboard</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainContent" class="hidden">
        <nav class="border-b border-white/10 px-6 py-4 flex justify-between items-center glass sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <span class="text-xl font-black text-orange-500 italic">⚡ FASTAPOS</span>
                <span id="tenantName" class="text-sm font-medium text-slate-400 border-l border-slate-700 pl-3"></span>
            </div>
            <div id="syncStatus" class="text-[10px] bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20 font-bold">Syncing...</div>
        </nav>

        <main class="p-4 max-w-7xl mx-auto space-y-6">
            
            <!-- KPI Section -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-5 rounded-2xl">
                    <div class="card-title"><i class="fa-solid fa-wallet text-emerald-500"></i> Mapato Leo</div>
                    <div id="revTotal" class="text-2xl font-black text-emerald-500">—</div>
                </div>
                <div class="glass p-5 rounded-2xl">
                    <div class="card-title"><i class="fa-solid fa-utensils text-orange-500"></i> Restaurant</div>
                    <div id="revRest" class="text-2xl font-black text-white">—</div>
                </div>
                <div class="glass p-5 rounded-2xl">
                    <div class="card-title"><i class="fa-solid fa-bed text-blue-500"></i> Hotel</div>
                    <div id="revHotel" class="text-2xl font-black text-white">—</div>
                </div>
                <div class="glass p-5 rounded-2xl">
                    <div class="card-title"><i class="fa-solid fa-clock text-amber-500"></i> Active Orders</div>
                    <div id="activeOrders" class="text-2xl font-black text-amber-500">—</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Stoo Section -->
                <div class="glass p-6 rounded-2xl">
                    <div class="card-title text-red-400"><i class="fa-solid fa-box-open"></i> Stock Alerts (Low)</div>
                    <div id="stockList" class="space-y-3">
                        <p class="text-slate-500 text-sm italic">Inapakia stoo...</p>
                    </div>
                </div>

                <!-- Wahudumu Section -->
                <div class="glass p-6 rounded-2xl">
                    <div class="card-title text-emerald-400"><i class="fa-solid fa-users"></i> Waiters Performance</div>
                    <div id="waiterList" class="space-y-3">
                        <p class="text-slate-500 text-sm italic">Inapakia wahudumu...</p>
                    </div>
                </div>
            </div>

            <!-- Top Items -->
            <div class="glass p-6 rounded-2xl">
                <div class="card-title text-orange-400"><i class="fa-solid fa-star"></i> Bidhaa Zinazouzwa Sana</div>
                <div id="topItemsList" class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-2">
                    <p class="text-slate-500 text-sm italic">Inapakia bidhaa...</p>
                </div>
            </div>

        </main>
    </div>

    <script>
        const API_URL = window.location.origin;
        let TOKEN = localStorage.getItem('fp_token');

        if (TOKEN) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            fetchData();
            setInterval(fetchData, 60000);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.ok) {
                localStorage.setItem('fp_token', data.token);
                localStorage.setItem('fp_tenant', JSON.stringify(data.tenant));
                window.location.reload();
            } else { alert(data.message); }
        }

        async function fetchData() {
            const tenant = JSON.parse(localStorage.getItem('fp_tenant'));
            document.getElementById('tenantName').innerText = tenant.name;

            try {
                const res = await fetch(`${API_URL}/api/dashboard`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const result = await res.json();
                if (!result.data) return;

                const d = result.data;
                const fmt = (v) => 'TSh ' + Number(v||0).toLocaleString();

                // 1. KPI
                document.getElementById('revTotal').innerText = fmt(d.totalRevenue);
                document.getElementById('revRest').innerText = fmt(d.restaurant?.revenue);
                document.getElementById('revHotel').innerText = fmt(d.hotel?.revenue);
                document.getElementById('activeOrders').innerText = d.restaurant?.activeOrders || 0;

                // 2. Stock Alerts
                const stockList = document.getElementById('stockList');
                if (d.lowStock?.length > 0) {
                    stockList.innerHTML = d.lowStock.map(i => `
                        <div class="flex justify-between items-center bg-red-500/5 p-3 rounded-lg border border-red-500/10">
                            <span class="text-sm font-medium">${i.name}</span>
                            <span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded font-bold">${i.quantity} ${i.unit}</span>
                        </div>
                    `).join('');
                } else { stockList.innerHTML = '<p class="text-emerald-500 text-sm">✅ Stoo yote iko sawa</p>'; }

                // 3. Waiters
                const waiterList = document.getElementById('waiterList');
                if (d.waiters?.length > 0) {
                    waiterList.innerHTML = d.waiters.sort((a,b) => b.total - a.total).map(w => `
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                            <div>
                                <div class="text-sm font-bold">${w.name}</div>
                                <div class="text-[10px] text-slate-500">${w.count} orders</div>
                            </div>
                            <div class="text-sm font-mono text-emerald-400 font-bold">${fmt(w.total)}</div>
                        </div>
                    `).join('');
                }

                // 4. Top Items
                const topList = document.getElementById('topItemsList');
                if (d.topItems?.length > 0) {
                    topList.innerHTML = d.topItems.map((item, i) => `
                        <div class="flex justify-between py-2 border-b border-slate-800/50 text-sm">
                            <span class="text-slate-400">${i+1}. ${item.name}</span>
                            <div class="flex gap-4">
                                <span class="text-orange-400 font-bold">x${item.qty}</span>
                                <span class="text-emerald-500 font-mono">${fmt(item.revenue)}</span>
                            </div>
                        </div>
                    `).join('');
                }

                document.getElementById('syncStatus').innerText = `✅ Sync: ${new Date(result.syncedAt).toLocaleTimeString()}`;
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
